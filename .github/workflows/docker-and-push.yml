name: Docker build & push

on:
    workflow_call:
        inputs:
            service-path:
                required: true
                type: string

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Login to Docker Hub Container Registry
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKER_HUB_USERNAME }}
                password: ${{ secrets.DOCKER_HUB_TOKEN }}

            - name: Prepare image metadata
              id: meta
              run: |
                SERVICE_NAME=$(echo "${{ inputs.service-path }}" | tr '/' '-')
                SHORT_SHA=${GITHUB_SHA::9}
                SHORT_SHA2=$(echo "${GITHUB_SHA}" | cut -c1-9)

                echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT
                echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
                echo "short_sha2=$SHORT_SHA2" >> $GITHUB_OUTPUT

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                directory: ${{ github.workspace }}/${{ inputs.service-path }}
                push: true
                tags: | 
                    ${{ vars.DOCKER_HUB_USERNAME }}/${{ steps.meta.outputs.SERVICE_NAME}}:latest
                    ${{ vars.DOCKER_HUB_USERNAME }}/${{ steps.meta.outputs.SERVICE_NAME}}:${{ steps.meta.outputs.SHORT_SHA}}
