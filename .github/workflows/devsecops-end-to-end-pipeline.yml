name: End to End DevSecOps Pipeline
on:
  workflow_dispatch:   # Fixed typo
  push:
    branches: [dev]
    
jobs: 
  check-code-lint:
    uses: ./.github/workflows/check-code-linter.yml
    strategy:
      matrix:
        service-path:
          # - backend/auth-service
          - backend/user-service
          - backend/product-service
          - backend/cart-service
          - backend/order-service
          - backend/api-gateway
        #   - frontend/client-app
    with:
      service-path: ${{ matrix.service-path }} 

  owasp-dependency-scan:
    uses: ./.github/workflows/owsap-dependency.yml
    strategy:
      matrix:
        service-path:
          - backend/auth-service
          - backend/user-service
          - backend/product-service
          - backend/cart-service
          - backend/order-service
          - backend/api-gateway
        #   - frontend/client-app
    with:
      service-path: ${{ matrix.service-path }} 
  
  secrets-scan:
    uses: ./.github/workflows/secrets.yml 

  docker-file-scan:
      uses: ./.github/workflows/docker-file-scan.yml
      strategy:
        matrix:
          service-path:
            - backend/auth-service
            - backend/user-service
            - backend/product-service
            - backend/cart-service
            - backend/order-service
            - backend/api-gateway 
            - frontend 
      with:
        service-path: ${{ matrix.service-path }}
      
  docker-build-and-push:
      uses: ./.github/workflows/docker-and-push.yml
      needs: [docker-file-scan, secrets-scan, check-code-lint]
      strategy:
        matrix:
          service-path:
            - backend/auth-service
            - backend/user-service
            - backend/product-service
            - backend/cart-service
            - backend/order-service
            - backend/api-gateway 
            - frontend
      with:
        service-path: ${{ matrix.service-path }}
      secrets:
        inherit
      
  trivy-image-scan:
      uses: ./.github/workflows/trivy-scan.yml
      needs: [docker-build-and-push,owasp-dependency-scan]
      strategy:
        matrix:
          service-path:
            - backend/auth-service
            - backend/user-service
            - backend/product-service
            - backend/cart-service
            - backend/order-service
            - backend/api-gateway 
      with:
        service-path: ${{ matrix.service-path }}
      secrets:
        inherit
     
  deploy:
      uses: ./.github/workflows/deploy-to-server.yml
      needs: [trivy-image-scan] 
      secrets:
        inherit