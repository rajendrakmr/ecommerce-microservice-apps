name: Check code dependency

on:
    workflow_call:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Dependency Review
              uses: actions/dependency-review-action@v4
              with:
                base-ref: main
                head-ref: dev
                fail-on-severity: high