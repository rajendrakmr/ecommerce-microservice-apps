name: Trivy image scan

on:
    workflow_call:
        inputs:
            service-path:
                type: string
                required: true

jobs:
    image-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Docker Hub register login
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKER_HUB_USERNAME }}
                password: ${{ secrets.DOCKER_HUB_TOKEN }}
            
            - name: Prepare image metadata
              id: meta
              run: |
                SERVICE_NAME=$(echo "${{ inputs.service-path }}" | tr '/' '-')
                SHORT_SHA=${GITHUB_SHA::9}
                SHORT_SHA2=$(echo "${GITHUB_SHA}" | cut -c1-9)

                echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT
                echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
                echo "short_sha2=$SHORT_SHA2" >> $GITHUB_OUTPUT

            - name: Image scan
              uses: aquasecurity/trivy-action@0.35.0
              with:
                image-ref: ${{ vars.DOCKER_HUB_USERNAME }}/${{ steps.meta.outputs.SERVICE_NAME}}:${{ steps.meta.outputs.SHORT_SHA}}
                format: table
                exit-code: '1'
                severity: CRITICAL
                ignore-unfixed: true 