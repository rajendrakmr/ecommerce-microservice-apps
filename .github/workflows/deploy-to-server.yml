name: Deploy
on:
    workflow_call:
    

jobs:
    to-server:
        runs-on: ubuntu-latest
        env:
            DOCKERHUB_USER: ${{ vars.DOCKER_HUB_USERNAME }}
            DOCKER_TAG: ${{ github.sha }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: ssh to production server
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |  
                  echo "Installing required packages & folders"
                  sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                  sudo usermod -aG docker $USER 
                  mkdir -p ecommerce
                
            - name: Copy the docker-compose file
              uses: appleboy/scp-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: docker-compose.yml
                target: ~/ecommerce
            
            - name: Prepare image metadata
              id: meta
              run: |
                    SHORT_SHA=${GITHUB_SHA::9}  # Take only the first 9 characters
                    echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

            - name: SSH to Prod server & run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: | 
                    export DOCKERHUB_USER=${{ vars.DOCKER_HUB_USERNAME }}
                    export DOCKER_TAG=${{ steps.meta.outputs.short_sha }}  # Use short SHA
                    echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login --username $DOCKERHUB_USER --password-stdin
                    cd ~/ecommerce
                    docker compose down
                    docker compose up -d --build --force-recreate --pull always