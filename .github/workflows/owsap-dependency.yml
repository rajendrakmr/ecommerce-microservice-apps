---
name: Dependency Check

on:
  workflow_call:
    inputs:
        service-path:
            required: true
            type: string

jobs:
  code-dependency:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.Js
        uses: actions/setup-node@v6
        with:
            node-version: '24' 

      - name: Cache node_modules for service
        uses: actions/cache@v3
        with:
            path: ${{ github.workspace }}/${{ inputs.service-path }}/node_modules
            key: ${{ runner.os }}-node-${{ hashFiles('${{ github.workspace }}/${{ inputs.service-path }}/package-lock.json') }}
            restore-keys: |
                ${{ runner.os }}-node-  

      - name: Install dependencies
        run: npm install

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main 
        with:
          project: "*"
          path: "."
          format: "HTML"
          out: "reports"

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports
          