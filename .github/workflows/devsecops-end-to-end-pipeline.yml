name: End to End DevSecOps Pipeline
on:
    push:
        branches: [dev]
    
jobs: 
  check-code-lint:
    uses: ./.github/workflows/check-code-linter.yml
    strategy:
      matrix:
        service-path:
          - backend/auth-service
          - backend/user-service
          - backend/product-service
          - backend/cart-service
          - backend/order-service
          - backend/api-gateway
        #   - frontend/client-app
    with:
      service-path: ${{ matrix.service-path }}
    secrets: inherit 
  
  dependency-review:
    uses: ./.github/workflows/code-dependency.yml 

  docker-file-scan:
      uses: ./.github/workflows/docker-file-scan.yml
      strategy:
        matrix:
          service-path:
            - backend/auth-service
            - backend/user-service
            - backend/product-service
            - backend/cart-service
            - backend/order-service
            - backend/api-gateway 
      with:
        service-path: ${{ matrix.service-path }}
      
  docker-build-and-push:
      uses: ./.github/workflows/docker-and-push.yml
      needs: [docker-file-scan, check-code-lint]
      strategy:
        matrix:
          service-path:
            - backend/auth-service
            - backend/user-service
            - backend/product-service
            - backend/cart-service
            - backend/order-service
            - backend/api-gateway 
      with:
        service-path: ${{ matrix.service-path }}
      secrets:
        inherit
      
  trivy-image-scan:
      uses: ./.github/workflows/trivy-scan.yml
      needs: [docker-build-and-push]
      strategy:
        matrix:
          service-path:
            - backend/auth-service
            - backend/user-service
            - backend/product-service
            - backend/cart-service
            - backend/order-service
            - backend/api-gateway 
      with:
        service-path: ${{ matrix.service-path }}
      secrets:
        inherit
     