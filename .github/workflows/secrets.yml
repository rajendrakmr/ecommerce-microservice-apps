name: Secrets Scan

on:
    workflow_call:

jobs:
    scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: gitleak secrets scan
              uses: gitleaks/gitleaks-action@v2.3.9
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

              